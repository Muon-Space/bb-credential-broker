name: pull-requests

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.25"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test -race -count=1 ./...
      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.12
          args: --timeout=5m

  build:
    name: build ${{ matrix.target.platform }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - { platform: linux_amd64,    goos: linux,   goarch: amd64, goamd64: "",  goarm: "",  ext: "" }
          - { platform: linux_amd64_v3, goos: linux,   goarch: amd64, goamd64: v3,  goarm: "",  ext: "" }
          - { platform: linux_386,      goos: linux,   goarch: "386", goamd64: "",  goarm: "",  ext: "" }
          - { platform: linux_arm,      goos: linux,   goarch: arm,   goamd64: "",  goarm: "7", ext: "" }
          - { platform: linux_arm64,    goos: linux,   goarch: arm64, goamd64: "",  goarm: "",  ext: "" }
          - { platform: darwin_amd64,   goos: darwin,  goarch: amd64, goamd64: "",  goarm: "",  ext: "" }
          - { platform: darwin_arm64,   goos: darwin,  goarch: arm64, goamd64: "",  goarm: "",  ext: "" }
          - { platform: freebsd_amd64,  goos: freebsd, goarch: amd64, goamd64: "",  goarm: "",  ext: "" }
          - { platform: windows_amd64,  goos: windows, goarch: amd64, goamd64: "",  goarm: "",  ext: ".exe" }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - name: Build ${{ matrix.target.platform }}
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          GOAMD64: ${{ matrix.target.goamd64 }}
          GOARM: ${{ matrix.target.goarm }}
        run: |
          OUT="bb-credential-broker.${{ matrix.target.platform }}${{ matrix.target.ext }}"
          go build -trimpath -ldflags='-s -w' -o "${OUT}" ./cmd/bb-credential-broker

  docker:
    name: docker ${{ matrix.arch.tag }}
    runs-on: ${{ matrix.arch.runner }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - { platform: linux/amd64, runner: ubuntu-24.04,     tag: linux-amd64 }
          - { platform: linux/arm64, runner: ubuntu-24.04-arm, tag: linux-arm64 }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: false
          platforms: ${{ matrix.arch.platform }}
          cache-from: type=gha,scope=bb-credential-broker-${{ matrix.arch.tag }}
          cache-to: type=gha,mode=max,scope=bb-credential-broker-${{ matrix.arch.tag }}
          provenance: false
